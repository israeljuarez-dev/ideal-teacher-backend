version: "2"
sql:
  # Módulo de USUARIOS
  - engine: "postgresql"
    schema: "storage/postgres/migrations" # Migraciones globales
    # Ruta a tus archivos de queries (donde está users.sql)
    queries: "internal/user/storage/postgres/queries"
    gen:
      go:
        package: "repository"
        # Ruta donde se generará el código Go
        out: "internal/user/storage/postgres/repository"
        sql_package: "pgx/v5"